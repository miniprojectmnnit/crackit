<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Extractor</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app">
    <h1>Interview Extractor</h1>
    <div id="status"></div>
    <div class="actions">
      <button id="extract-btn">Extract Interview Questions</button>
      <button id="mock-btn" style="display:none;">Start Mock Interview</button>
    </div>

    <div id="interview-ui" style="display:none;">
      <h3>Mock Interview</h3>
      <p id="question-text"></p>
      <div class="interview-actions">
        <button id="next-btn">Next Question</button>
        <button id="finish-btn" style="display:none;">Finish</button>
      </div>
    </div>

    <div id="questions-list"></div>
  </div>
  <script type="module" src="./main.js"></script>
</body>

</html>
